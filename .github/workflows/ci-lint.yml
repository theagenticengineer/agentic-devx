name: ci-lint

on:
  pull_request:
    # branches: [main]  # TODO: uncomment after first PR merges

jobs:
  lint:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Run lint
        run: mise run lint
