name: ci-tests

on:
  pull_request:
    # branches: [main]  # TODO: uncomment after first PR merges

jobs:
  test:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Run tests
        run: mise run test
