name: ci-review

on:
  pull_request:
    # branches: [main]  # TODO: uncomment after first PR merges

jobs:
  review:
    name: review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Run review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run review -- "${{ github.event.pull_request.number }}"
